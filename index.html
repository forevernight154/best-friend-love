<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chillkoja ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff0080,#ff4da6,#ff66cc,#ff99dd);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    color:white;
    z-index:10;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

h1{
    font-size:4rem;
    text-shadow:0 0 20px white;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white,0 0 20px #ff66cc;
    }
    to{
        text-shadow:0 0 20px white,0 0 40px #ff1493;
    }
}

p{
    margin-top:20px;
    font-size:1.4rem;
    max-width:700px;
    line-height:1.7;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
}

.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}

#message{
    margin-top:20px;
    font-size:1.6rem;
    color:white;
    text-shadow:0 0 10px white;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Chillkoja ❤️</h1>

    <p>
        Some friends become family. <br>
        And you are one of the most special people in my life. 🌸
        <br><br>
        Thank you for every laugh, every memory,
        and every moment we shared together.
    </p>

    <button class="btn" onclick="showLove()">
        Click Me ✨
    </button>

    <div id="message"></div>
</div>

<script>

function showLove(){
    document.getElementById("message").innerHTML=
    "💖 Chillkoja, you are an amazing friend and you will always have a special place in my heart! 💖";
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*4+4)+"s";
    heart.style.fontSize=(Math.random()*20+15)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,200);

</script>

</body>
</html>
